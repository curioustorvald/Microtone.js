<!doctype html><meta charset="utf-8"><title>pattern-ditto ghost cells</title>
<pre id="out">running…</pre>
<img src="/hang" hidden>
<iframe id="app" src="../../index.html?load=test/corpus/WHEN.taud" style="width:1200px;height:700px"></iframe>
<script type="module">
// Pattern Ditto (effect 7) QoL: the rows the engine repeats paint the
// would-be-played source values in the ghost colour (--cv-ditto) wherever the
// repeated row leaves a sub-column blank. Both grids (Timeline + Patterns).
//
// The canvas is inspected by recording every fillText with the fillStyle in
// force — pixel sampling would be at the mercy of font rasterisation.
const out = document.getElementById("out");
const log = (s) => { out.textContent += "\n" + s; };
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
const frames = async (win, n) => { for (let i = 0; i < n; i++) await new Promise((r) => win.requestAnimationFrame(r)); };
let fails = 0;
const check = (ok, name, extra = "") => { if (!ok) fails++; log(`${ok ? "PASS" : "FAIL"} ${name}${extra ? " — " + extra : ""}`); };

/** Wrap a 2D context so fillText/paint calls are recorded with their ink. */
function recorder(ctx) {
  const calls = [];
  const orig = ctx.fillText.bind(ctx);
  ctx.fillText = (text, x, y) => { calls.push({ text, x, y, ink: ctx.fillStyle }); orig(text, x, y); };
  return { calls, restore() { ctx.fillText = orig; } };
}

(async () => {
  const app = document.getElementById("app");
  await new Promise((r) => app.addEventListener("load", r));
  const win = app.contentWindow;
  for (let i = 0; i < 200 && !win.__microtone; i++) await sleep(50);
  const M = win.__microtone;
  if (!M) { log("no __microtone"); return; }
  for (let i = 0; i < 200 && !M.store.song; i++) await sleep(50);
  await frames(win, 3);

  const { store, timeline, patternView } = M;
  const ops = await import("../../src/doc/ops.js");
  const { dittoGhosts } = await import("../../src/doc/ditto.js");
  // Read the ink from the APP frame — a theme.js imported here would resolve
  // the variables against this harness page, which carries no theme.
  const DITTO = win.getComputedStyle(win.document.documentElement)
    .getPropertyValue("--cv-ditto").trim();
  log(`ghost ink = ${DITTO}`);
  check(!!DITTO, "--cv-ditto is defined in the theme");

  // ── build a known pattern on cue 0 / channel 0 ──────────────────────────
  const PAT = store.song.cues[0][0] & 0x7fff;
  const origGhosts = dittoGhosts(store.doc.patternAt(0, PAT), 64).filter(Boolean).length;
  const bytes = new Uint8Array(512);
  for (let r = 0; r < 64; r++) { bytes[r * 8 + 3] = 0xc0; bytes[r * 8 + 4] = 0xc0; } // blank convention
  // row 0: C4, inst $05, vol v20, pan p10, fx 10123
  bytes[0] = 0x00; bytes[1] = 0x50; bytes[2] = 0x05;
  bytes[3] = 0x20; bytes[4] = 0x10; bytes[5] = 0x01; bytes[6] = 0x23; bytes[7] = 0x01;
  // row 1: 7$0102 — repeat the 1 row above, twice (rows 1 and 2)
  bytes[1 * 8 + 5] = 0x07; bytes[1 * 8 + 6] = 0x02; bytes[1 * 8 + 7] = 0x01;
  // row 2: an explicit instrument — must stay in its own colour, not ghosted
  bytes[2 * 8 + 2] = 0x09;
  store.undo.apply(ops.setPatternBytesOp(0, PAT, bytes));
  store.emit("edit");
  await frames(win, 3);

  const pat = store.doc.patternAt(0, PAT);
  const g = dittoGhosts(pat, 64);
  check(g[0] === null && !!g[1] && !!g[2] && g[3] === null, "ghost map covers exactly rows 1-2");
  check(g[2] && g[2].inst === null, "row 2's explicit instrument is not ghosted");

  // ── Timeline ────────────────────────────────────────────────────────────
  timeline.scrollRow = 0; timeline.scrollCh = 0;
  store.cursor.row = 40; store.cursor.ch = 3; // keep the cursor off the rows under test
  const rec = recorder(timeline.ctx);
  timeline.draw(-1);
  rec.restore();
  // Channel 0 only: GUTTER_W(76) .. GUTTER_W + COL_W(176) — the next column's
  // note cell starts right after, and would otherwise leak into the row sets.
  const ch0 = rec.calls.filter((c) => c.x >= 76 && c.x < 76 + 176);
  const rowOf = (c) => Math.round((c.y - 58 - 8) / 16); // HEADER_H, ROW_H
  const at = (row) => ch0.filter((c) => rowOf(c) === row);

  const t1 = at(1), t2 = at(2), t3 = at(3);
  const inkOf = (cells, text) => cells.find((c) => c.text === text)?.ink;

  check(inkOf(t1, "05") === DITTO, "row 1 instrument ghosted", `ink=${inkOf(t1, "05")}`);
  check(inkOf(t1, "v20") === DITTO, "row 1 volume ghosted", `ink=${inkOf(t1, "v20")}`);
  check(inkOf(t1, "p10") === DITTO, "row 1 pan ghosted", `ink=${inkOf(t1, "p10")}`);
  check(t1.some((c) => c.text === "70102"), "row 1 keeps its own visible 7$llrr command");
  check(!t1.some((c) => c.text === "10123"), "the arming row's fx is NOT overpainted by a ghost");

  check(inkOf(t2, "09") !== DITTO && !!inkOf(t2, "09"), "row 2's explicit instrument keeps its own ink",
    `ink=${inkOf(t2, "09")}`);
  check(inkOf(t2, "10123") === DITTO, "row 2's blank fx column shows the ghosted effect",
    `ink=${inkOf(t2, "10123")}`);
  check(inkOf(t2, "v20") === DITTO, "row 2 volume ghosted");

  check(t3.every((c) => c.ink !== DITTO), "row 3 (outside the region) has no ghost ink");
  check(t3.some((c) => c.text === "··"), "row 3 still paints the empty-instrument dots");

  // Ghost notes paint through the glyph engine, so check the note cell moved
  // off the "empty" path: an empty cell draws "····", a ghosted one does not.
  check(!t1.some((c) => c.text === "····"), "row 1 note cell is not the empty glyph");
  check(t3.some((c) => c.text === "····"), "row 3 note cell IS the empty glyph");

  // ── Patterns view ───────────────────────────────────────────────────────
  win.dispatchEvent(new win.KeyboardEvent("keydown", { key: "F3", code: "F3", bubbles: true }));
  win.document.dispatchEvent(new win.KeyboardEvent("keydown", { key: "F3", code: "F3", bubbles: true }));
  await frames(win, 3);
  patternView.setPattern(PAT);
  patternView.active.scrollRow = 0;
  patternView.cursor.row = 40;
  await frames(win, 3);
  const prec = recorder(patternView.active.ctx);
  patternView.active.draw();
  prec.restore();
  const prowOf = (c) => Math.round((c.y - 8) / 16);
  const p1 = prec.calls.filter((c) => prowOf(c) === 1);
  const p3 = prec.calls.filter((c) => prowOf(c) === 3);
  check(p1.find((c) => c.text === "05")?.ink === DITTO, "Patterns: row 1 instrument ghosted",
    `ink=${p1.find((c) => c.text === "05")?.ink}`);
  check(p1.find((c) => c.text === "v20")?.ink === DITTO, "Patterns: row 1 volume ghosted");
  check(p3.every((c) => c.ink !== DITTO), "Patterns: row 3 has no ghost ink");

  // ── undo restores the pre-ditto painting ────────────────────────────────
  store.undo.undo(store.doc);
  store.emit("edit");
  await frames(win, 3);
  const g2 = dittoGhosts(store.doc.patternAt(0, PAT), 64).filter(Boolean).length;
  check(g2 === origGhosts, "undo restores the original ghost map", `${g2} vs ${origGhosts}`);

  log(fails === 0 ? "\nALL PASS" : `\n${fails} FAILED`);
})();
</script>
