<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ui smoke: mute/solo + renames + files tab + editors + pattern ops</title>
</head>
<body>
  <pre id="out">running…</pre>
  <!-- worker-less page: the virtual-time --dump-dom recipe applies -->
  <iframe id="app" src="../../index.html?load=test/corpus/WHEN.taud" style="width:1200px;height:700px"></iframe>
  <!-- second instance WITHOUT a document: the File tab must still open -->
  <iframe id="app2" src="../../index.html" style="width:1200px;height:400px"></iframe>
  <script type="module">
    const out = [];
    const log = (line) => {
      out.push(line);
      console.log("SMOKE: " + line);
      document.getElementById("out").textContent = out.join("\n");
    };

    (async () => {
      try {
        const frame = document.getElementById("app");
        const win = await new Promise((resolve) => {
          const poll = setInterval(() => {
            const w = frame.contentWindow;
            if (w && w.__microtone?.store.doc) { clearInterval(poll); resolve(w); }
          }, 100);
        });
        const { store, timeline, patternView, projectView: pv } = win.__microtone;
        const key = (code, opts = {}) =>
          win.dispatchEvent(new win.KeyboardEvent("keydown", { code, bubbles: true, ...opts }));
        log("app loaded");

        // ── i18n boot: static chrome translated via data-i18n ──
        const langBtn = win.document.getElementById("langBtn");
        const i18nOk = !!langBtn && langBtn.textContent === "EN" &&
          win.document.getElementById("playSong").textContent === "▶ Song";
        log(`i18n applied (langBtn "${langBtn?.textContent}"): ${i18nOk ? "ok" : "FAIL"}`);

        // ── About popup on brand click ──
        win.document.getElementById("brandBtn").click();
        const aboutDlg = win.document.querySelector("dialog.about-modal");
        const aboutOk = !!aboutDlg && aboutDlg.textContent.includes("Special thanks");
        aboutDlg?.querySelector(".modal-buttons button")?.click();
        const aboutClosed = !win.document.querySelector("dialog.about-modal");
        log(`About popup opens + closes: ${aboutOk && aboutClosed ? "ok" : "FAIL"}`);

        // ── mute/solo keys (navigate mode; taut M/N semantics) ──
        store.record = false;
        store.cursor.ch = 2;
        key("KeyM");
        const muteOn = store.voiceMutes[2] === true;
        key("KeyM");
        const muteOff = store.voiceMutes[2] === false;
        log(`M toggles mute: ${muteOn && muteOff ? "ok" : "FAIL"}`);
        key("KeyN");
        const n = store.doc.channelCount;
        let soloOk = store.voiceMutes[2] === false;
        for (let i = 0; i < n; i++) if (i !== 2 && !store.voiceMutes[i]) soloOk = false;
        key("KeyN");
        let unmutedAll = true;
        for (let i = 0; i < n; i++) if (store.voiceMutes[i]) unmutedAll = false;
        log(`N solos then clears: ${soloOk && unmutedAll ? "ok" : "FAIL"}`);
        store.record = true;
        key("KeyM");
        log(`record mode keeps M as piano: ${store.voiceMutes[2] === false ? "ok" : "FAIL"}`);
        store.record = false;

        // ── header click mute / ctrl+click solo ──
        const { CELL_CHARS } = await import("../../src/ui/edit.js");
        const GUTTER_W = 76, COL_W = Math.ceil(CELL_CHARS * 7.9) + 10; // timeline.js layout (CHAR_W)
        const rect = timeline.canvas.getBoundingClientRect();
        const hdrClick = (chVisIdx, ctrl) => timeline.onPointerDown({
          clientX: rect.left + GUTTER_W + chVisIdx * COL_W + 10,
          clientY: rect.top + 10,
          ctrlKey: ctrl, metaKey: false,
        });
        hdrClick(0, false);
        const clickMute = store.voiceMutes[timeline.scrollCh + 0] === true;
        hdrClick(0, false);
        hdrClick(1, true);
        const clickSoloCh = timeline.scrollCh + 1;
        let clickSolo = !store.voiceMutes[clickSoloCh];
        for (let i = 0; i < n; i++) if (i !== clickSoloCh && !store.voiceMutes[i]) clickSolo = false;
        store.clearMutes();
        log(`header click mute / ctrl+click solo: ${clickMute && clickSolo ? "ok" : "FAIL"}`);

        // ── project rename (PNam) escapes + display decode ──
        pv.changeProjectName("Neue Œuvre");
        const pn = store.doc.meta.projectName;
        const pnam = store.doc.projSections.find((s) => s.fourcc === "PNam");
        const { parseTaud } = await import("../../src/format/taud-parse.js");
        const re = parseTaud(store.doc.toBytes());
        const stFile = win.document.getElementById("stFile").textContent;
        const projOk = pn === "Neue \\u0152uvre" && !!pnam && re.meta.projectName === pn &&
          stFile.includes("Neue Œuvre") && !stFile.includes("\\u0152");
        log(`project rename escapes + status shows decoded name: ${projOk ? "ok" : "FAIL"}`);

        // (item 60 Project housekeeping is covered by test/browser/cleanup-smoke.html
        //  — it needs real-time + a stubbed alert(), so it lives in its own page.)

        // ── song rename now lives on the File tab's song list ──
        const gone = !win.document.getElementById("songRenameBtn");
        pv.changeName("Renamed Song", 0);
        const smOk = store.doc.meta.songMeta[0].name === "Renamed Song" && store.doc.smetEdited;
        win.document.querySelector('#tabs button[data-view="files"]').click();
        await new Promise((r) => setTimeout(r, 300)); // refresh() is async
        const filesHost = win.document.getElementById("filesHost");
        const songHead = filesHost.querySelector(".files-songs-head");
        const renameBtns = [...filesHost.querySelectorAll("table")].at(-1)
          ?.querySelectorAll("tbody button") ?? [];
        const midiBtnFiles = [...filesHost.querySelectorAll(".files-bar button")]
          .some((b) => b.textContent === "Import MIDI…");
        const songListOk = gone && smOk && !!songHead && renameBtns.length === store.doc.songs.length &&
          filesHost.textContent.includes("Renamed Song");
        log(`File-tab song list + rename buttons (topbar ✎ gone): ${songListOk ? "ok" : "FAIL"}`);
        log(`File-tab Import MIDI… button: ${midiBtnFiles ? "ok" : "FAIL"}`);

        // ── sample DSP editor (Samples tab): Apply keeps, Cancel rolls back ──
        {
          const doc = store.doc;
          const { openSampleDspEditor, openInstSampleEditor } =
            await win.eval('import("/src/ui/popups/sampleeditor.js")');
          const census = doc.sampleList();
          const s = census.find((e) => e.users.some((u) =>
            !doc.instruments[u].isMeta && doc.instruments[u].samplePtr === e.ptr &&
            doc.instruments[u].sampleLength === e.len));
          const span = () => Array.from(doc.sampleBin.subarray(s.ptr, Math.min(s.ptr + 64, s.ptr + s.len)));
          const before = span();
          const depth0 = store.undo.undoStack.length;

          // Cancel path
          let closed = openSampleDspEditor(store, s);
          let dlg = win.document.querySelector("dialog.sample-editor");
          const dspButtons = [...dlg.querySelectorAll(".smp-ops button")].map((b) => b.textContent);
          const hasDsp = ["Normalise", "Fade in", "Fade out", "Reverse", "Invert"].every((x) => dspButtons.includes(x));
          // DSP-only tab: no marker spinners (number inputs); a rename text field IS present.
          const noMarkers = dlg.querySelectorAll(".smp-fields input[type=number]").length === 0;
          const nameInput = dlg.querySelector(".smp-fields input[type=text]");
          const hasRename = !!nameInput;
          const btns = [...dlg.querySelectorAll(".modal-buttons button")].map((b) => b.textContent);
          const btnOk = btns[0] === "Apply" && btns[1] === "Cancel";
          // rename (undoable): edit the SNam entry, then Cancel must roll it back
          const nameBefore = doc.sampleName(s.index);
          nameInput.value = "SmokeRenamed";
          nameInput.dispatchEvent(new win.Event("change", { bubbles: true }));
          const renamed = doc.sampleName(s.index) === "SmokeRenamed";
          // invert twice = identity (polarity involution away from 0x00 clamp)
          [...dlg.querySelectorAll(".smp-ops button")].find((b) => b.textContent === "Invert").click();
          [...dlg.querySelectorAll(".smp-ops button")].find((b) => b.textContent === "Normalise").click();
          const changed = span().some((v, i) => v !== before[i]);
          // bug #65: the audition button previews the EXACT census sample via
          // jamSample (ptr/len on screen), not jamNote-through-the-owning-inst.
          // Stub the audio system to capture the spec without a real device.
          const realAudio = store.audio, realEnsure = win.__microtoneEnsureAudio;
          let auditionSpec = null;
          win.__microtoneEnsureAudio = async () => {};
          store.audio = { jamSample: (ph, v, note, spec) => { auditionSpec = spec; }, jamStop: () => {} };
          const auditionBtn = [...dlg.querySelectorAll(".smp-ops button")].find((b) => b.textContent === "▶ C4");
          auditionBtn?.click();
          await new Promise((r) => win.setTimeout(r, 0));
          const auditionOk = !!auditionBtn && !!auditionSpec &&
            auditionSpec.ptr === s.ptr && auditionSpec.len === s.len;
          store.audio = realAudio; win.__microtoneEnsureAudio = realEnsure;
          log(`DSP editor audition previews the exact census sample (bug #65): ${auditionOk ? "ok" : "FAIL"}`);
          [...dlg.querySelectorAll(".modal-buttons button")][1].click(); // Cancel
          await closed;
          const rolledBack = span().every((v, i) => v === before[i]) &&
            doc.sampleName(s.index) === nameBefore &&
            store.undo.undoStack.length === depth0;
          log(`DSP editor (DSP-only + rename/invert, Apply/Cancel rolls back): ${hasDsp && noMarkers && hasRename && btnOk && renamed && changed && rolledBack ? "ok" : "FAIL"}`);

          // Apply path
          closed = openSampleDspEditor(store, s);
          dlg = win.document.querySelector("dialog.sample-editor");
          [...dlg.querySelectorAll(".smp-ops button")].find((b) => b.textContent === "Reverse").click();
          [...dlg.querySelectorAll(".modal-buttons button")][0].click(); // Apply
          await closed;
          const kept = span().some((v, i) => v !== before[i]) &&
            store.undo.undoStack.length === depth0 + 1;
          store.undo.undo();
          log(`DSP editor Apply keeps the edit (1 undo step): ${kept ? "ok" : "FAIL"}`);

          // ── instrument sample editor (Instruments tab): markers, one slot ──
          const slot = s.users.find((u) => !doc.instruments[u].isMeta &&
            doc.instruments[u].samplePtr === s.ptr && doc.instruments[u].sampleLength === s.len);
          const other = s.users.find((u) => u !== slot &&
            !doc.instruments[u].isMeta && doc.instruments[u].samplePtr === s.ptr);
          const loopBefore = doc.instruments[slot].sampleLoopStart;
          closed = openInstSampleEditor(store, slot);
          dlg = win.document.querySelector("dialog.sample-editor");
          const spin = dlg.querySelectorAll(".smp-fields input[type=number]");
          const openOk = !!dlg && spin.length === 3 && !!dlg.querySelector(".smp-canvas");
          spin[1].value = "9";
          spin[1].dispatchEvent(new win.Event("change", { bubbles: true }));
          const wrote = doc.instruments[slot].sampleLoopStart === 9;
          const scoped = other === undefined || doc.instruments[other].sampleLoopStart !== 9 ||
            loopBefore === 9;
          [...dlg.querySelectorAll(".modal-buttons button")][1].click(); // Cancel
          await closed;
          const instRolled = doc.instruments[slot].sampleLoopStart === loopBefore;
          log(`inst sample editor (3 markers, single slot, cancel restores): ${openOk && wrote && scoped && instRolled ? "ok" : "FAIL"}`);
        }

        // ── item 40: new instrument from an existing pooled sample ──
        {
          const doc = store.doc;
          const { newInstrumentFromSample } = await win.eval('import("/src/ui/popups/importsample.js")');
          const s = doc.sampleList()[0];
          const usedBefore = new Set(doc.usedInstrumentSlots());
          const censusBefore = doc.sampleList().length;
          const depth0 = store.undo.undoStack.length;

          const p = newInstrumentFromSample(store, s);
          const dlg = [...win.document.querySelectorAll("dialog.modal")].pop();
          dlg.querySelector('input[name="name"]').value = "SmokeFromSample";
          [...dlg.querySelectorAll(".modal-buttons button")][0].click(); // Create
          const res = await p;
          const slot = res?.firstSlot;
          const inst = slot != null ? doc.instruments[slot] : null;
          const madeOk = !!res && !usedBefore.has(slot) && slot >= 1 && slot <= 255 &&
            inst.samplePtr === s.ptr && inst.sampleLength === s.len &&
            doc.sampleList().length === censusBefore &&      // pooled sample reused, no new census entry
            doc.instrumentName(slot) === "SmokeFromSample" &&
            store.undo.undoStack.length === depth0 + 1;
          store.undo.undo();
          const undoneOk = !doc.usedInstrumentSlots().includes(slot) &&
            store.undo.undoStack.length === depth0;
          // the Samples-view toolbar carries the button too
          const samplesView = win.__microtone.samplesView;
          samplesView.show();
          const hasBtn = !!samplesView.newInstBtn &&
            [...samplesView.toolbar.querySelectorAll("button")].some((b) => /New instrument/.test(b.textContent));
          samplesView.hide();
          log(`new instrument from pooled sample (item 40): made=${madeOk} undo=${undoneOk} btn=${hasBtn} (${madeOk && undoneOk && hasBtn ? "ok" : "FAIL"})`);
        }

        // ── item 53: paint-a-waveform — CREATE (Instruments) + EDIT (Samples) ──
        {
          const doc = store.doc;
          const { paintNewSample, paintEditSample } = await win.eval('import("/src/ui/popups/waveformpaint.js")');
          // CREATE: new looping instrument (button lives on the Instruments view).
          const usedBefore = new Set(doc.usedInstrumentSlots());
          const depth0 = store.undo.undoStack.length;
          const p = paintNewSample(store);
          let dlg = [...win.document.querySelectorAll("dialog.wavepaint-modal")].pop();
          dlg.querySelector(".wave-len").value = "128";
          dlg.querySelector(".wave-len").dispatchEvent(new win.Event("change", { bubbles: true }));
          dlg.querySelector('.wave-shapes button[data-shape="sine"]').click();
          dlg.querySelector(".wave-name").value = "SmokePaint";
          dlg.querySelector(".wave-ok").click();
          const res = await p;
          const slot = res?.firstSlot;
          const inst = slot != null ? doc.instruments[slot] : null;
          const madeOk = !!res && !usedBefore.has(slot) && inst && inst.sampleLength === 128 &&
            inst.loopMode === 1 && inst.sampleLoopEnd === 128 &&
            doc.instrumentName(slot) === "SmokePaint" && store.undo.undoStack.length === depth0 + 1;
          store.undo.undo();
          const undoneOk = !doc.usedInstrumentSlots().includes(slot) && store.undo.undoStack.length === depth0;
          const iv = win.__microtone.instrumentsView; iv.show();
          const instBtn = [...(iv.listEl?.querySelectorAll("button") ?? [])]
            .some((b) => /Paint sample/.test(b.textContent));
          iv.hide?.();

          // EDIT: repaint a pooled sample in place → pool bytes change (1 undo step).
          const smpView = win.__microtone.samplesView; smpView.show();
          const sample = smpView.list.reduce((a, b) => (b.len < a.len ? b : a)); // shortest → avoid the >1024 warn
          smpView.selected = smpView.list.indexOf(sample);
          const before = Uint8Array.from(doc.sampleBin.subarray(sample.ptr, sample.ptr + sample.len));
          const d0 = store.undo.undoStack.length;
          const origConfirm = win.confirm; win.confirm = () => true; // accept any >1024 warning
          const pe = paintEditSample(store, sample);
          dlg = [...win.document.querySelectorAll("dialog.wavepaint-modal")].pop();
          const noLenInput = !dlg.querySelector(".wave-len"); // fixed length in edit mode
          dlg.querySelector('.wave-shapes button[data-shape="square"]').click();
          dlg.querySelector(".wave-ok").click();
          await pe;
          win.confirm = origConfirm;
          const changed = [...doc.sampleBin.subarray(sample.ptr, sample.ptr + sample.len)].some((v, i) => v !== before[i]);
          const editOneStep = store.undo.undoStack.length === d0 + 1;
          store.undo.undo();
          const editUndone = [...doc.sampleBin.subarray(sample.ptr, sample.ptr + sample.len)].every((v, i) => v === before[i]);
          const smpBtn = [...(smpView.toolbar?.querySelectorAll("button") ?? [])].some((b) => b.textContent === "Paint…");
          smpView.hide();

          const ok = madeOk && undoneOk && instBtn && noLenInput && changed && editOneStep && editUndone && smpBtn;
          log(`paint waveform (item 53): create=${madeOk && undoneOk && instBtn} edit=${changed && editOneStep && editUndone} smpBtn=${smpBtn} (${ok ? "ok" : "FAIL"})`);
        }

        // ── item 39: "play from cue" honours the Cues-view cursor ──
        {
          const { cuesView, playCursor } = win.__microtone;
          const prevView = store.view;
          const nCues = store.song.cues.length;
          store.view = "cues";
          const target = Math.min(2, Math.max(0, nCues - 1));
          cuesView.cursor.cue = target;
          const fromCues = playCursor().cue === target;
          // clamp a phantom row past the materialised cue list to the last cue
          cuesView.cursor.cue = 9999;
          const clamped = playCursor().cue === nCues - 1;
          // Timeline view still maps the Timeline cursor (row 0 → cue of that row)
          store.view = "timeline";
          const tlLoc = timeline.locate(store.cursor.row);
          const fromTl = playCursor().cue === (tlLoc ? tlLoc.entry.cue : 0);
          store.view = prevView;
          log(`play-from-cue uses Cues cursor (item 39): cues=${fromCues} clamp=${clamped} timeline=${fromTl} (${fromCues && clamped && fromTl ? "ok" : "FAIL"})`);
        }

        // ── item 38: WAV export progress popup (bar + pct + cancel signal) ──
        {
          const { showProgress } = await win.eval('import("/src/ui/popups/progress.js")');
          const prog = showProgress("Test", { cancellable: true });
          const dlg = win.document.querySelector("dialog.progress-modal");
          prog.set(0.5);
          const bar = dlg?.querySelector("progress.progress-bar");
          const midOk = !!dlg && !!bar && Math.abs(bar.value - 0.5) < 1e-6 &&
            dlg.querySelector(".progress-pct").textContent === "50%" &&
            prog.signal instanceof win.AbortSignal;
          prog.done();
          const gone = !win.document.querySelector("dialog.progress-modal");
          log(`WAV progress popup (bar/pct/signal/close, item 38): ${midOk && gone ? "ok" : "FAIL"}`);
        }

        // ── pattern ops: duplicate / lengthen / shorten ──
        {
          const song = store.song;
          const n0 = song.patterns.length;
          patternView.setPattern(2);
          patternView.duplicate();
          const dupOk = song.patterns.length === n0 + 1 && patternView.patIdx === n0 &&
            JSON.stringify([...store.doc.patternBytes(0, n0)]) ===
            JSON.stringify([...store.doc.patternBytes(0, 2)]);
          store.undo.undo();
          const undone = song.patterns.length === n0;
          log(`pattern Duplicate + undo: ${dupOk && undone ? "ok" : "FAIL"}`);

          patternView.setPattern(2);
          const { expandPatternBytes } = await win.eval('import("/src/doc/patterntools.js")');
          const want = expandPatternBytes(store.doc.patternBytes(0, 2));
          patternView.applyPatternBytes(expandPatternBytes);
          const exOk = JSON.stringify([...store.doc.patternBytes(0, 2)]) === JSON.stringify([...want]);
          store.undo.undo();
          const barLabels = [...patternView.bar.querySelectorAll("button")].map((b) => b.textContent);
          // Item 55: Duplicate renamed "Duplicate pattern" and moved to the very end.
          const barOk = ["Duplicate pattern", "Transpose…", "Lengthen…", "Shorten…",
            "Volume…", "Pan…", "Instrument…"].every((x) => barLabels.includes(x)) &&
            barLabels[barLabels.length - 1] === "Duplicate pattern";
          log(`pattern Lengthen via bar (+ all seven buttons): ${exOk && barOk ? "ok" : "FAIL"}`);

          // ── item 22: volume / pan / instrument bulk popups ──
          // seed pattern 2 row 0 with vol 20 / pan 40 / inst 05, then drive each popup
          const seed = new Uint8Array(store.doc.patternBytes(0, 2));
          seed[3] = 20; seed[4] = 40; seed[2] = 0x05;
          const { setPatternBytesOp } = await win.eval('import("/src/doc/ops.js")');
          store.undo.apply(setPatternBytesOp(0, 2, seed));
          patternView.setPattern(2);
          const cell = () => store.song.patterns[2][0];
          const runPopup = async (btnLabel, fill) => {
            [...patternView.bar.querySelectorAll("button")].find((b) => b.textContent === btnLabel).click();
            await new Promise((r) => setTimeout(r, 20));
            const dlg = win.document.querySelector("dialog.modal");
            for (const [name, val] of Object.entries(fill)) {
              const inp = dlg.querySelector(`[name="${name}"]`);
              inp.value = val;
            }
            [...dlg.querySelectorAll(".modal-buttons button")][0].click(); // Apply
            await new Promise((r) => setTimeout(r, 20));
          };
          await runPopup("Volume…", { mult: "2", add: "0" });
          const volOk = cell().volume === 40;
          await runPopup("Pan…", { mult: "1", shift: "-8" });
          const panOk = cell().pan === 32; // 40 shifted −8
          await runPopup("Instrument…", { from: "05", to: "0A" });
          const instOk = cell().instrment === 0x0a;
          store.undo.undo(); store.undo.undo(); store.undo.undo(); store.undo.undo();
          log(`pattern Volume/Pan/Instrument popups: ${volOk && panOk && instOk ? "ok" : `FAIL vol=${volOk} pan=${panOk} inst=${instOk}`}`);
        }

        // ── item 34: pattern rename (pNam) via the pane header name input ──
        {
          win.document.querySelector('#tabs button[data-view="pattern"]').click();
          patternView.setPattern(2);
          const pane = patternView.active;
          pane.nameInput.value = "SmokePat";
          pane.nameInput.dispatchEvent(new win.Event("change", { bubbles: true }));
          const named = store.doc.patternName(2) === "SmokePat";
          const hasPnam = store.doc.projSections.some((s) => s.fourcc === "pNam");
          // display: refreshHeader repopulates the input from the doc (name shown alongside number)
          pane.nameInput.value = "";
          patternView.refreshAllHeaders();
          const shown = pane.nameInput.value === "SmokePat";
          store.undo.undo();
          const cleared = store.doc.patternName(2) === "";
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          log(`pattern rename (pNam) + header display + undo: ${named && hasPnam && shown && cleared ? "ok" : `FAIL named=${named} pnam=${hasPnam} shown=${shown} cleared=${cleared}`}`);
        }

        // ── item 34: instrument rename (INam) + logarithmic Fadeout slider ──
        {
          const instView = win.__microtone.instrumentsView;
          win.document.querySelector('#tabs button[data-view="instruments"]').click();
          const slot = store.doc.usedInstrumentSlots()[2];
          instView.selected = slot;
          instView.tab = "general";
          instView.refresh();
          // rename via the panel name input (present atop every tab)
          const nameInp = instView.panel.querySelector(".inst-name-input");
          nameInp.value = "SmokeInst";
          nameInp.dispatchEvent(new win.Event("change", { bubbles: true }));
          const named = store.doc.instrumentName(slot) === "SmokeInst";
          // list-row label updates in place
          const rowEl = instView.rowEls.find((r) => r.slot === slot)?.el;
          const listShown = rowEl?.querySelector(".name")?.textContent === "SmokeInst";
          // Fadeout slider is logarithmic (0..1000 travel) while a linear peer stays 0..255
          const rows = [...instView.panel.querySelectorAll(".slider-row")];
          const rowFor = (lbl) => rows.find((r) => r.querySelector(".sl-label")?.textContent === lbl);
          const fadeRange = rowFor("Fadeout")?.querySelector(".sl-range");
          const volRange = rowFor("Global vol")?.querySelector(".sl-range");
          const logOk = fadeRange?.max === "1000" && volRange?.max === "255";
          // slider bottom maps to 0 (off), top to the real max (1024)
          fadeRange.value = "1000";
          fadeRange.dispatchEvent(new win.Event("input", { bubbles: true }));
          const topMax = rowFor("Fadeout").querySelector(".sl-num").value === "1024";
          store.undo.undo(); // fadeout drag
          store.undo.undo(); // rename
          const rolled = store.doc.instrumentName(slot) === "";
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          log(`instrument rename (INam) + log Fadeout slider: ${named && listShown && logOk && topMax && rolled ? "ok" : `FAIL named=${named} list=${listShown} log=${logOk} top=${topMax} rolled=${rolled}`}`);
        }

        // ── item 34: name-display render paths (Timeline corner + Cues tag) ──
        {
          const { cuesView } = win.__microtone;
          const { setSectionOp } = await win.eval('import("/src/doc/ops.js")');
          // find a cell with a real pattern and name it
          let hit = null;
          for (let r = 0; r < 64 && !hit; r++)
            for (let ch = 0; ch < store.doc.channelCount && !hit; ch++)
              hit = timeline.cellAt(r, ch);
          store.undo.apply(setSectionOp("pNam", store.doc.buildPatternNames(hit.pat, "TagName")));
          let threw = false;
          try {
            store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 };
            timeline.draw(-1); // exercises the top-left corner name display
            cuesView.cursor = { cue: 0, col: 2, nib: 0 }; // channel-0 cell → floating tag
            cuesView.draw();
          } catch (e) { threw = true; win.console.log("render err", e); }
          store.undo.undo();
          log(`Timeline/Cues name render (no throw): ${!threw ? "ok" : "FAIL"}`);
        }

        // ── shift+wheel scrolls timeline channels (repaint + no cell edit) ──
        {
          const wheel = (opts) => timeline.canvas.dispatchEvent(
            new win.WheelEvent("wheel", { deltaY: 120, bubbles: true, cancelable: true, ...opts }));
          // navigate mode, anywhere on the canvas
          store.record = false;
          timeline.scrollCh = 0;
          timeline.needsRedraw = false;
          wheel({ shiftKey: true });
          const scrolled = timeline.scrollCh === 1 && timeline.needsRedraw === true;
          // Firefox delivers shift+wheel as deltaX with deltaY 0
          wheel({ shiftKey: true, deltaY: 0, deltaX: 120 });
          const scrolledDx = timeline.scrollCh === 2;
          log(`shift+wheel scrolls channels + repaints (deltaY & deltaX): ${scrolled && scrolledDx ? "ok" : "FAIL"}`);

          // record mode, pointer over the CURSOR cell: must scroll, not edit
          store.record = true;
          timeline.scrollCh = 0;
          store.cursor = { row: 0, ch: 0, sub: 1, nib: 0 }; // inst column (wheel-editable even when empty)
          timeline.scrollRow = 0;
          const r = timeline.canvas.getBoundingClientRect();
          const depth = store.undo.undoStack.length;
          const overCursor = { clientX: r.left + 76 + 8, clientY: r.top + 50 + 8 }; // GUTTER_W/HEADER_H
          wheel({ shiftKey: true, ...overCursor });
          const chScrolled = timeline.scrollCh === 1;
          const noEdit = store.undo.undoStack.length === depth;
          store.record = false;
          store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 };
          log(`record mode: shift+wheel over cursor cell scrolls, no edit: ${chScrolled && noEdit ? "ok" : "FAIL"}`);
        }

        // ── horizontal wheel (touchpad/tilt, no shift) scrolls channels ──
        {
          const wheel = (cv, opts) => cv.dispatchEvent(
            new win.WheelEvent("wheel", { deltaY: 0, deltaX: 0, bubbles: true, cancelable: true, ...opts }));
          // Timeline: deltaX-dominant gesture scrolls channels, not rows
          store.record = false;
          timeline.scrollCh = 0;
          const row0 = timeline.scrollRow;
          wheel(timeline.canvas, { deltaX: 120, deltaY: 4 });
          const tlH = timeline.scrollCh === 1 && timeline.scrollRow === row0;
          // deltaY-dominant still scrolls rows, channels untouched
          wheel(timeline.canvas, { deltaY: 120, deltaX: 4 });
          const tlV = timeline.scrollCh === 1 && timeline.scrollRow > row0;
          timeline.scrollRow = row0;
          // record mode over the cursor cell: horizontal scrolls, never edits
          store.record = true;
          timeline.scrollCh = 0;
          store.cursor = { row: 0, ch: 0, sub: 1, nib: 0 };
          const r = timeline.canvas.getBoundingClientRect();
          const depth = store.undo.undoStack.length;
          wheel(timeline.canvas, { deltaX: 120, clientX: r.left + 76 + 8, clientY: r.top + 50 + 8 });
          const tlRec = timeline.scrollCh === 1 && store.undo.undoStack.length === depth;
          store.record = false;
          store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 };
          // Cues: deltaX-dominant scrolls channels, cue rows untouched
          const { cuesView } = win.__microtone;
          cuesView.scrollCh = 0;
          const cue0 = cuesView.scrollCue;
          wheel(cuesView.canvas, { deltaX: 120, deltaY: 4 });
          const cuH = cuesView.scrollCh === 2 && cuesView.scrollCue === cue0;
          cuesView.scrollCh = 0;
          log(`horizontal wheel scrolls channels (timeline+cues): ${tlH && tlV && tlRec && cuH ? "ok" : `FAIL tl=${tlH} v=${tlV} rec=${tlRec} cues=${cuH}`}`);
        }

        // ── Space on a Cues Cmd column opens the command popup ──
        {
          const { cuesView } = win.__microtone;
          const space = () => win.dispatchEvent(
            new win.KeyboardEvent("keydown", { code: "Space", key: " ", bubbles: true }));
          win.document.querySelector('#tabs button[data-view="cues"]').click();
          cuesView.cursor = { cue: 0, col: 0, nib: 0 };
          const recWas = store.record;
          space();
          await new Promise((r2) => setTimeout(r2, 20));
          const dlg = win.document.querySelector("dialog.modal");
          const opened = !!dlg && store.record === recWas; // popup, no record toggle
          if (dlg) {
            const btns = [...dlg.querySelectorAll(".modal-buttons button")];
            btns[btns.length - 1].click(); // Cancel
            await new Promise((r2) => setTimeout(r2, 20));
          }
          // on a channel column Space keeps its record-toggle double action
          cuesView.cursor = { cue: 0, col: 2, nib: 0 };
          space();
          const toggled = store.record !== recWas && !win.document.querySelector("dialog.modal");
          store.record = recWas;
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          log(`Space on Cmd column opens cue command popup: ${opened && toggled ? "ok" : `FAIL open=${opened} toggle=${toggled}`}`);
        }

        // ── raw-hex note entry (Raw on): hex types into the note word; jam off ──
        {
          const kd = (code, k, opts = {}) =>
            win.dispatchEvent(new win.KeyboardEvent("keydown", { code, key: k, bubbles: true, ...opts }));
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          const rawWas = store.rawNoteView;
          store.rawNoteView = true; store.record = true;
          store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 }; // note column
          const target0 = timeline.cursorCell();
          let noteOk = false, jamOverridden = false, hexA = false;
          if (target0) {
            const depth0 = store.undo.undoStack.length;
            kd("Delete", "Delete");
            kd("Digit5", "5"); kd("Digit0", "0"); kd("Digit0", "0"); kd("Digit0", "0");
            noteOk = timeline.cursorCell().cell.note === 0x5000;
            const before = timeline.cursorCell().cell.note;
            win.__microtone.jam.held.clear();
            kd("KeyS", "s"); // non-hex jam key → swallowed, no jam, no edit
            jamOverridden = win.__microtone.jam.held.size === 0 && timeline.cursorCell().cell.note === before;
            kd("KeyA", "a"); // 'a' = hex A, NOT jam C
            hexA = timeline.cursorCell().cell.note === (((before << 4) | 0xa) & 0xffff);
            while (store.undo.undoStack.length > depth0) store.undo.undo();
          }
          store.record = false; store.rawNoteView = rawWas;
          store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 };
          log(`raw-hex note entry (Raw on): note=${noteOk} jamOff=${jamOverridden} hexA=${hexA} (${noteOk && jamOverridden && hexA ? "ok" : "FAIL"})`);
        }

        // ── item 24: piano keys are inert on Cues / Project / File ──
        {
          const { jam } = win.__microtone;
          const pressA = () => key(win, "KeyA", "a");
          jam.held.clear();
          win.document.querySelector('#tabs button[data-view="project"]').click();
          pressA();
          const projInert = jam.held.size === 0;
          win.document.querySelector('#tabs button[data-view="cues"]').click();
          pressA();
          const cuesInert = jam.held.size === 0;
          win.document.querySelector('#tabs button[data-view="files"]').click();
          pressA();
          const filesInert = jam.held.size === 0;
          // instruments view still auditions (key registers as held)
          win.document.querySelector('#tabs button[data-view="instruments"]').click();
          win.dispatchEvent(new win.KeyboardEvent("keydown", { code: "KeyA", key: "a", bubbles: true }));
          const instJams = jam.held.has("KeyA");
          win.dispatchEvent(new win.KeyboardEvent("keyup", { code: "KeyA", key: "a", bubbles: true }));
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          log(`jam disabled on Cues/Project/File, on in Instruments: ${projInert && cuesInert && filesInert && instJams ? "ok" : `FAIL proj=${projInert} cues=${cuesInert} files=${filesInert} inst=${instJams}`}`);
        }

        // ── item 27: quick instrument lookup panel ──
        {
          const { instLookup } = win.__microtone;
          win.document.querySelector('#tabs button[data-view="timeline"]').click();
          const btn = win.document.getElementById("tbInstList");
          // ensure it starts hidden, then toggle on
          if (!instLookup.el.hidden) btn.click();
          btn.click();
          const shown = !instLookup.el.hidden && instLookup.el.querySelectorAll(".il-row").length > 0;
          // every listed slot is a top-level instrument in $01..$FF (no meta-layer children)
          const doc = store.doc;
          const children = new Set();
          for (const s of doc.usedInstrumentSlots()) {
            const layers = doc.instruments[s].metaLayers;
            if (layers) for (const l of layers) children.add(l.instIdx);
          }
          const listed = [...instLookup.el.querySelectorAll(".il-row")].map((r) => +r.dataset.slot);
          const rangeOk = listed.every((s) => s >= 1 && s <= 0xff && !children.has(s));
          // clicking a row sets the current instrument
          const first = instLookup.el.querySelector(".il-row");
          first.click();
          const picked = win.__microtone.jam.currentInst === +first.dataset.slot;
          // toggle off hides it
          btn.click();
          const hidden = instLookup.el.hidden;
          log(`inst lookup: toggle+list+range+pick+hide: ${shown && rangeOk && picked && hidden ? "ok" : `FAIL shown=${shown} range=${rangeOk} pick=${picked} hide=${hidden}`}`);
        }

        // ── topbar Import MIDI… + Open accept without .mid ──
        const midBtn = win.document.getElementById("importMidiBtn");
        const accept = win.document.getElementById("fileInput").accept;
        const openOk2 = !!midBtn && !accept.includes(".mid") && accept.includes(".xm");
        log(`Import MIDI button + Open accept "${accept}": ${openOk2 ? "ok" : "FAIL"}`);

        // ── second instance, NO document: File tab must open ──
        const frame2 = document.getElementById("app2");
        const win2 = await new Promise((resolve) => {
          const poll = setInterval(() => {
            const w = frame2.contentWindow;
            if (w && w.__microtone) { clearInterval(poll); resolve(w); }
          }, 100);
        });
        win2.document.querySelector('#tabs button[data-view="files"]').click();
        await new Promise((r) => setTimeout(r, 300));
        const host2 = win2.document.getElementById("filesHost");
        const saveDisabled = host2.querySelector(".files-bar button")?.disabled === true;
        const noDocOk = !host2.hidden && win2.__microtone.store.view === "files" &&
          win2.document.getElementById("emptyState").hidden && saveDisabled;
        log(`File tab reachable without a document (Save greyed): ${noDocOk ? "ok" : "FAIL"}`);

        // ── Korean boot: saved language applies to the static chrome ──
        localStorage.setItem("microtone-lang", "ko");
        frame2.src = "../../index.html";
        const win3 = await new Promise((resolve) => {
          const poll = setInterval(() => {
            const w = frame2.contentWindow;
            if (w && w.__microtone) { clearInterval(poll); resolve(w); }
          }, 100);
        });
        const koPlay = win3.document.getElementById("playSong").textContent;
        const koTab = win3.document.querySelector('#tabs button[data-view="files"]').textContent;
        const koBtn = win3.document.getElementById("langBtn").textContent;
        localStorage.removeItem("microtone-lang");
        const koOk = koPlay === "▶ 곡" && koTab === "파일" && koBtn === "KO";
        log(`ko boot ("${koPlay}" / "${koTab}" / ${koBtn}): ${koOk ? "ok" : "FAIL"}`);

        log(out.some((l) => l.includes("FAIL")) ? "FAILURES" : "ALL PASS");
      } catch (err) {
        log("ERROR: " + err.message + "\n" + err.stack);
      }
    })();
  </script>
</body>
</html>
