<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>shot34</title>
<style>body{margin:0}iframe{border:0;display:block}</style>
</head>
<body>
  <iframe id="app" src="../../index.html?load=test/corpus/WHEN.taud" style="width:1280px;height:760px"></iframe>
  <script type="module">
    const which = new URLSearchParams(location.search).get("v") || "pattern";
    const frame = document.getElementById("app");
    const win = await new Promise((res) => {
      const p = setInterval(() => {
        const w = frame.contentWindow;
        if (w && w.__microtone?.store.doc) { clearInterval(p); res(w); }
      }, 80);
    });
    const { store, patternView, instrumentsView } = win.__microtone;
    const tab = (v) => win.document.querySelector(`#tabs button[data-view="${v}"]`).click();
    const { setSectionOp } = await win.eval('import("/src/doc/ops.js")');

    // give a few patterns names for the display
    store.undo.apply(setSectionOp("pNam", store.doc.buildPatternNames(0, "Intro riff")));
    store.undo.apply(setSectionOp("pNam", store.doc.buildPatternNames(1, "Bass line")));
    store.undo.apply(setSectionOp("pNam", store.doc.buildPatternNames(2, "Lead melody")));

    if (which === "pattern") {
      tab("pattern");
      patternView.panes.forEach((p, i) => p.setPattern(i));
      patternView.refreshAllHeaders();
    } else if (which === "instruments") {
      tab("instruments");
      instrumentsView.selected = store.doc.usedInstrumentSlots()[1];
      instrumentsView.tab = "general";
      instrumentsView.refresh();
    } else if (which === "timeline") {
      tab("timeline");
      store.cursor = { row: 0, ch: 0, sub: 0, nib: 0 };
      win.__microtone.timeline.draw(-1);
    }
    await new Promise((r) => setTimeout(r, 400));
    document.title = "READY";
  </script>
</body>
</html>
