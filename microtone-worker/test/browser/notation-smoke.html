<!doctype html><meta charset="utf-8"><title>notation maker smoke (item 61)</title>
<pre id="out">running…</pre>
<img src="/hang" hidden>
<iframe id="app" src="../../index.html?load=test/corpus/WHEN.taud" style="width:1200px;height:760px"></iframe>
<script type="module">
// Item 61 Notation Maker: open from the Project view, create a definition on
// an empty slot, resize via Equal divisions, edit a symbol, Save+assign →
// "nota" section + sMet notation 65535 + live pitch preset; grids repaint with
// the custom table; undo removes the section byte-exact; reopen sees the def;
// Cancel leaves the doc alone. (.scl/.taudnot file paths are Node-covered —
// file pickers can't be driven headless.)
const out = document.getElementById("out");
const log = (s) => { out.textContent += "\n" + s; };
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
let ok = true;
const check = (name, cond) => { if (!cond) ok = false; log(`${cond ? "ok  " : "FAIL"} ${name}`); };
window.addEventListener("error", (e) => log("ERROR: " + e.message));
(async () => {
 try {
  const app = document.getElementById("app");
  await new Promise((r) => app.addEventListener("load", r));
  const win = app.contentWindow;
  for (let i = 0; i < 200 && !win.__microtone?.store?.doc; i++) await sleep(50);
  const M = win.__microtone;
  if (!M) { log("no __microtone"); log("RESULT: FAIL"); return; }
  const { store } = M;
  const doc = win.document;
  win.alert = () => {};            // a real alert blocks the headless page
  win.confirm = () => true;

  // ── open the maker from the Project view ──
  doc.querySelector('#tabs button[data-view="project"]').click();
  await sleep(100);
  const makerBtn = [...doc.querySelectorAll("button")]
    .find((b) => b.textContent.includes("Notation Maker"));
  check("Project view has the Notation Maker button", !!makerBtn);
  makerBtn.click();
  await sleep(300); // dynamic import
  let dlg = doc.querySelector("dialog.nota-modal");
  check("maker dialog opens", !!dlg && dlg.open);
  if (!dlg) { log("RESULT: FAIL"); return; }

  // ── empty project: 16 empty slots ──
  const slots = dlg.querySelectorAll(".nota-slot");
  check("16 slots listed", slots.length === 16);
  check("all slots empty", dlg.querySelectorAll(".nota-slot.empty").length === 16);

  // ── click slot 0 → seed definition (12 equal, octave) ──
  slots[0].click();
  await sleep(30);
  check("seed def selected", dlg.querySelectorAll(".nota-slot.empty").length === 15);
  check("seed has 12 degrees", dlg.querySelectorAll(".nota-degrees tbody tr").length === 12);
  const octChip = [...dlg.querySelectorAll(".nota-chip")].find((c) => c.classList.contains("sel"));
  check("octave chip selected on the seed", !!octChip);

  // ── name it ──
  const nameIn = dlg.querySelector(".nota-ed-head input[type=text]");
  nameIn.value = "Smoke 19";
  nameIn.dispatchEvent(new Event("change"));
  await sleep(20);
  check("slot list shows the name", dlg.querySelector(".nota-slot.sel .nota-slot-name").textContent === "Smoke 19");

  // ── Equal divisions → 19 ──
  const eqBtn = [...dlg.querySelectorAll(".nota-tools button")]
    .find((b) => b.textContent.startsWith("Equal"));
  eqBtn.click();
  await sleep(60);
  const eqDlg = [...doc.querySelectorAll("dialog.modal")].find((d) => d !== dlg && d.open);
  check("equal-divisions modal opens", !!eqDlg);
  const nIn = eqDlg.querySelector("input");
  nIn.value = "19";
  eqDlg.querySelector(".modal-buttons button").click();
  await sleep(50);
  const rows = dlg.querySelectorAll(".nota-degrees tbody tr");
  check("19 degrees after equal division", rows.length === 19);
  check("each degree has a glyph preview", dlg.querySelectorAll("canvas.nota-preview").length === 19);

  // ── edit degree 1's letter ──
  const letterSel = rows[1].querySelectorAll("select")[1];
  letterSel.value = "Q";
  letterSel.dispatchEvent(new Event("change"));
  await sleep(30);
  check("letter select edits the symbol",
    dlg.querySelectorAll(".nota-degrees tbody tr")[1].querySelectorAll("select")[1].value === "Q");

  // ── save with assign ──
  check("assign checkbox default on", dlg.querySelector('[data-f="assign"]').checked);
  const saveBtn = dlg.querySelector('[data-f="save"]');
  check("save enabled (no issues)", !saveBtn.disabled);
  saveBtn.click();
  await sleep(100);
  check("dialog closed", !doc.querySelector("dialog.nota-modal"));
  const sec = store.doc.projSections.find((s) => s.fourcc === "nota");
  check("nota section saved", !!sec);
  const sm = store.doc.meta.songMeta[store.songIndex];
  check("sMet notation = 65535", sm.notation === 0xffff);
  check("live preset is the custom table", store.pitchPreset.index === 0xffff
    && store.pitchPreset.table.length === 19 && store.pitchPreset.name === "Smoke 19");
  check("custom degree-1 letter carried", store.pitchPreset.sym[1][1] === "Q");

  // ── grids repaint with the custom preset (no-throw) ──
  doc.querySelector('#tabs button[data-view="timeline"]').click();
  await sleep(150);
  doc.querySelector('#tabs button[data-view="pattern"]').click();
  await sleep(150);
  check("timeline + patterns drew with the custom preset", true);

  // ── project view select lists the custom notation ──
  doc.querySelector('#tabs button[data-view="project"]').click();
  await sleep(100);
  const notSel = [...doc.querySelectorAll(".inst-field select")]
    .find((s) => s.querySelector("optgroup"));
  check("notation select gained the custom optgroup", !!notSel
    && [...notSel.options].some((o) => o.textContent === "Smoke 19" && o.value === "65535"));

  // ── undo removes the section ──
  const before = sec.payload;
  store.undo.undo();
  await sleep(30);
  check("undo removes the nota section",
    !store.doc.projSections.some((s) => s.fourcc === "nota"));
  check("customNotations cache follows", store.doc.customNotations().length === 0);
  store.undo.redo();
  await sleep(30);
  const sec2 = store.doc.projSections.find((s) => s.fourcc === "nota");
  check("redo restores the payload ref", sec2 && sec2.payload === before);

  // ── reopen: def present; Cancel leaves the doc alone ──
  [...doc.querySelectorAll("button")]
    .find((b) => b.textContent.includes("Notation Maker")).click();
  await sleep(200);
  dlg = doc.querySelector("dialog.nota-modal");
  check("reopen shows the saved def", dlg
    && dlg.querySelector(".nota-slot .nota-slot-name").textContent === "Smoke 19");
  // delete it locally, then Cancel — the document must keep the section
  const delBtn = [...dlg.querySelectorAll(".nota-tools button")]
    .find((b) => b.textContent === "Delete");
  delBtn.click();
  await sleep(30);
  check("local delete empties the slot list", dlg.querySelectorAll(".nota-slot.empty").length === 16);
  dlg.querySelector('[data-f="cancel"]').click();
  await sleep(50);
  check("cancel leaves the saved section untouched",
    store.doc.projSections.some((s) => s.fourcc === "nota"));

  log(ok ? "RESULT: PASS" : "RESULT: FAIL");
 } catch (e) {
  log("ERROR: " + e.message + "\n" + e.stack);
  log("RESULT: FAIL");
 }
})();
</script>
