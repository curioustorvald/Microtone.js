<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="favicon.png"><!-- Website favicon -->
  <link rel="apple-touch-icon" type="image/png" href="favicon.png"> <!-- Apple favicon -->
  <meta name="description" content="An online music tracker — with microtonality. Supports old-school formats and soundfonts.">
  <title>Microtone</title>
  <link rel="stylesheet" href="css/microtone.css" />
</head>
<body class="app-page">
  <!-- Boot splash (item 67): covers the module-graph load. Hidden markup +
       an inline classic script (runs during parse, long before app.js's
       module graph lands; a no-JS page never unhides it). Purely visual —
       pointer-events:none — and app.js calls window.__splash.done() when
       the shell is ready. Loading messages live in src/ui/lang/*.js under
       "splash.msg.*" (the lang files are dependency-free ES modules, so the
       splash dynamic-imports them directly, ahead of the app). -->
  <div id="splash" class="splash" hidden>
    <div class="splash-brand"><span class="brand brand-red">Micro</span><span class="brand brand-white">tone</span></div>
    <div class="splash-grid" id="splashGrid"><div class="splash-ph"></div></div>
    <div class="splash-status"><span class="splash-spin"></span><span class="splash-msg" id="splashMsg" role="status" aria-live="polite"></span></div>
  </div>
  <script>
  (function () {
    "use strict";
    // Early theme — the saved choice, else the OS preference (the same rule
    // as theme.js initTheme, which re-applies the same value once the app
    // boots), so neither the splash nor the first app paint flashes the
    // wrong palette.
    var theme = null;
    try { theme = localStorage.getItem("microtone-theme"); } catch (e) { /* private mode */ }
    document.documentElement.dataset.theme = theme ||
      (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");

    var el = document.getElementById("splash");
    var grid = document.getElementById("splashGrid");
    var msgEl = document.getElementById("splashMsg");
    el.hidden = false;
    var S = window.__splash = { shown: true, finished: false, msgCount: 0, done: done };

    // Fake pattern grid — 16 rows of plausible tracker cells in the real
    // column colours, freshly random each load; CSS sweeps a playhead bar
    // down it (steps(16), like a playing pattern).
    var NOTES = ["C-", "C♯", "D-", "D♯", "E-", "F-", "F♯", "G-", "G♯", "A-", "A♯", "B-"];
    var FX = ["D02", "F06", "G12", "H44", "B00", "S9F"];
    function cell(cls, txt) {
      var s = document.createElement("span");
      s.className = cls;
      s.textContent = txt;
      return s;
    }
    for (var r = 0; r < 16; r++) {
      var row = document.createElement("div");
      row.className = "splash-row";
      row.appendChild(cell("sc-num", "0" + r.toString(16).toUpperCase()));
      var filled = Math.random() < 0.55;
      row.appendChild(cell("sc-note", filled ? NOTES[Math.random() * 12 | 0] + (3 + (Math.random() * 3 | 0)) : "···"));
      row.appendChild(cell("sc-inst", filled ? "0" + (1 + (Math.random() * 3 | 0)) : "··"));
      row.appendChild(cell("sc-vol", filled && Math.random() < 0.7 ? (16 + (Math.random() * 49 | 0)).toString(16).toUpperCase() : "··"));
      row.appendChild(cell("sc-fx", Math.random() < 0.25 ? FX[Math.random() * FX.length | 0] : "···"));
      grid.appendChild(row);
    }

    // Whimsical loading messages, Sims-style: shuffled "splash.msg.*" keys
    // from the active language (en as the always-available fallback),
    // rotated with a short fade until the app dismisses the splash.
    var msgs = [], mi = 0;
    function nextMsg() {
      if (msgs.length === 0) return;
      msgEl.classList.add("fade");
      setTimeout(function () {
        msgEl.textContent = msgs[mi++ % msgs.length];
        msgEl.classList.remove("fade");
      }, 220);
    }
    var rotTimer = setInterval(nextMsg, 2600);

    var dicts = { en: null, lang: null };
    function refreshMsgs() {
      var merged = {}, k;
      if (dicts.en) for (k in dicts.en) merged[k] = dicts.en[k];
      if (dicts.lang) for (k in dicts.lang) merged[k] = dicts.lang[k];
      var list = [];
      for (k in merged) if (k.indexOf("splash.msg.") === 0) list.push(merged[k]);
      if (list.length === 0) return;
      for (var i = list.length - 1; i > 0; i--) { // shuffle
        var j = (Math.random() * (i + 1)) | 0, tmp = list[i];
        list[i] = list[j]; list[j] = tmp;
      }
      var first = msgs.length === 0;
      msgs = list; mi = 0; S.msgCount = list.length;
      if (first) nextMsg();
    }
    var lang = "en";
    try { lang = localStorage.getItem("microtone-lang") || "en"; } catch (e) { /* private mode */ }
    if (!/^[a-z-]+$/.test(lang)) lang = "en";
    import("./src/ui/lang/en.js").then(function (m) { dicts.en = m.default; refreshMsgs(); }).catch(function () {});
    if (lang !== "en") {
      import("./src/ui/lang/" + lang + ".js").then(function (m) { dicts.lang = m.default; refreshMsgs(); }).catch(function () {});
    }

    // done(): fade out and remove — but only after MIN_SHOW ms on screen
    // (a sub-perceptual flash reads as jank, not as a splash).
    var t0 = Date.now();
    var MIN_SHOW = 500;
    function done() {
      if (S.finished) return;
      S.finished = true;
      setTimeout(function () {
        clearInterval(rotTimer);
        el.classList.add("splash-out");
        setTimeout(function () { el.remove(); }, 400);
      }, Math.max(0, MIN_SHOW - (Date.now() - t0)));
    }
    setTimeout(done, 45000); // failsafe: a broken boot must never hide the page forever
  })();
  </script>
  <header class="topbar">
    <div class="brand-container" id="brandBtn" data-i18n-title="topbar.aboutTitle">
      <span class="brand brand-red">Micro</span><span class="brand brand-white">tone</span>
    </div>
    <div class="transport-controls">
      <button id="playSong" data-i18n="topbar.playSong" data-i18n-title="topbar.playSongTitle">&#65038;▶ Song</button>
      <button id="playCue" data-i18n="topbar.playCue" data-i18n-title="topbar.playCueTitle">&#65038;▶ Cue</button>
      <button id="stopBtn" data-i18n-title="topbar.stopTitle">&#65038;■</button>
      <label class="chk"><input type="checkbox" id="follow" checked /><span data-i18n="topbar.follow">follow</span></label>
      <button id="recBtn" class="rec on" data-i18n="topbar.rec" data-i18n-title="topbar.recTitle">&#65038;⏺ rec</button>
      <span class="tb-sep"></span>
      <button id="undoBtn" class="icon-btn" data-i18n-title="topbar.undoTitle" disabled>&#65038;↶</button>
      <button id="redoBtn" class="icon-btn" data-i18n-title="topbar.redoTitle" disabled>&#65038;↷</button>
      <span id="undoStat" class="dim undo-stat"></span>
      <span class="tb-sep"></span>
      <span id="octCtl" class="dim wheelable" data-i18n-title="topbar.octTitle">Oct <b id="octDisp">4</b></span>
      <span id="instCtl" class="dim wheelable" data-i18n-title="topbar.instTitle">Inst <b id="instDisp">01</b></span>
    </div>
    <div class="pos">
      <span class="wheelable-dummy">Cue <b id="posCue">–</b></span>
      <span class="wheelable-dummy">Row <b id="posRow">–</b></span>
      <span class="wheelable-dummy">BPM <b id="posBpm">–</b></span>
      <span id="spdCtl" class="wheelable" data-i18n-title="topbar.spdTitle">Spd <b id="posSpd">–</b></span>
    </div>
    <div>
      <label><span data-i18n="topbar.song">Song </span><select id="songSel"></select></label>
    </div>
    <div>
      <button id="newBtn" data-i18n="topbar.new">New…</button>
      <button id="openBtn" data-i18n="topbar.open">Open…</button>
      <button id="importMidiBtn" data-i18n="topbar.importMidi" data-i18n-title="topbar.importMidiTitle">Import MIDI…</button>
      <input id="fileInput" type="file" accept=".taud,.tsii,.tpif" hidden />
    </div>
    <div class="grow"></div>
    <div>
      <span id="audioBadge" class="badge" data-i18n="topbar.audioOff">audio off</span>
      <a class="support-btn donate" href="https://paypal.me/curioustorvald" target="_blank" rel="noopener" data-i18n="topbar.donate" data-i18n-title="topbar.donateTitle">♥ Donate</a>
      <a class="support-btn sponsor" href="https://github.com/sponsors/curioustorvald" target="_blank" rel="noopener" data-i18n="topbar.sponsor" data-i18n-title="topbar.sponsorTitle">Sponsor</a>
      <button id="reloadBtn" class="icon-btn" data-i18n-title="topbar.reloadTitle">&#8635;</button>
      <button id="helpBtn" class="icon-btn" data-i18n-title="topbar.helpTitle">?</button>
      <button id="langBtn" data-i18n-title="topbar.langTitle">EN</button>
      <button id="themeBtn" data-i18n-title="topbar.themeTitle">&#65038;◐</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="timeline" class="active" data-i18n="tab.timeline">Timeline</button>
    <button data-view="cues" data-i18n="tab.cues">Cues</button>
    <button data-view="pattern" data-i18n="tab.pattern">Patterns</button>
    <button data-view="samples" data-i18n="tab.samples">Samples</button>
    <button data-view="instruments" data-i18n="tab.instruments">Instruments</button>
    <button data-view="project" data-i18n="tab.project">Project</button>
    <button data-view="files" data-i18n="tab.files">File</button>
  </nav>

  <div id="toolbox" class="toolbox" hidden>
    <button id="tbRetune" data-i18n="toolbox.retune">Retune…</button>
    <button id="tbRaw" data-i18n-title="toolbox.rawTitle">Raw: off</button>
    <button id="tbInstList" data-i18n="toolbox.instList" data-i18n-title="toolbox.instListTitle">Instruments</button>
  </div>

  <main id="viewHost" class="view-host">
    <div id="emptyState" class="empty-state">
      <p><strong data-i18n="empty.drop">Drop a .taud file anywhere</strong><span data-i18n="empty.orOpen"> or use Open…</span></p>
    </div>
    <canvas id="timeline" class="view-canvas" hidden></canvas>
    <canvas id="cuesCanvas" class="view-canvas" hidden></canvas>
    <div id="patternHost" class="view-dom" hidden></div>
    <div id="samplesHost" class="view-dom" hidden></div>
    <div id="instrumentsHost" class="view-dom" hidden></div>
    <div id="projectHost" class="view-dom" hidden></div>
    <div id="filesHost" class="files-host" hidden></div>
    <div id="placeholder" class="empty-state" hidden></div>
    <aside id="instLookup" class="inst-lookup" hidden></aside>
  </main>

  <div id="cmdPalette" class="cmd-palette" hidden></div>

  <footer class="statusbar">
    <span id="stFile" class="dim" data-i18n="status.noFile">no file</span>
    <span id="stDirty" class="dirty" hidden>&#65038;●</span>
    <div class="grow"></div>
    <span id="stHint" class="dim" data-i18n="status.hint">Space play/stop · arrows navigate · wheel scroll</span>
    <a class="gh-link" href="docs.html" target="_blank" rel="noopener" data-i18n="status.docs" data-i18n-title="status.docsTitle">Docs &#65038;↗</a>
    <a class="gh-link" href="https://github.com/curioustorvald/Microtone.js" target="_blank" rel="noopener" title="View source / fork on GitHub" data-i18n="status.fork">Fork me on GitHub &#65038;↗</a>
  </footer>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
