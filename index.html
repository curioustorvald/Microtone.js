<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Microtone.js</title>
  <link rel="stylesheet" href="css/microtone.css" />
</head>
<body class="app-page">
  <header class="topbar">
    <div class="brand-container">
      <span class="brand brand-red">Micro</span><span class="brand brand-white">tone</span>
    </div>
    <div class="transport-controls">
      <button id="playSong" title="Play from start (Shift+Space)">▶ Song</button>
      <button id="playCue" title="Play from current cue">▶ Cue</button>
      <button id="stopBtn" title="Stop (Space)">■</button>
      <label class="chk"><input type="checkbox" id="follow" checked />follow</label>
      <button id="recBtn" class="rec on" title="Record mode (Insert)">⏺ rec</button>
      <span class="tb-sep"></span>
      <button id="undoBtn" class="icon-btn" title="Undo (Ctrl+Z)" disabled>↶</button>
      <button id="redoBtn" class="icon-btn" title="Redo (Ctrl+Y)" disabled>↷</button>
      <span id="undoStat" class="dim undo-stat"></span>
      <span class="tb-sep"></span>
      <span id="octCtl" class="dim wheelable" title="wheel: octave ([ ])">Oct <b id="octDisp">4</b></span>
      <span id="instCtl" class="dim wheelable" title="wheel: step used instruments">Inst <b id="instDisp">01</b></span>
    </div>
    <div class="pos">
      <span class="wheelable-dummy">Cue <b id="posCue">–</b></span>
      <span class="wheelable-dummy">Row <b id="posRow">–</b></span>
      <span class="wheelable-dummy">BPM <b id="posBpm">–</b></span>
      <span id="spdCtl" class="wheelable" title="wheel: live playback speed">Spd <b id="posSpd">–</b></span>
    </div>
    <div>
      <label>Song <select id="songSel"></select></label>
      <button id="songRenameBtn" title="Rename this song">Rename</button>
    </div>
    <div>
      <button id="newBtn">New…</button>
      <button id="openBtn">Open…</button>
      <button id="importMidiBtn" title="Convert a MIDI file with a chosen soundfont">Import MIDI…</button>
      <input id="fileInput" type="file" accept=".taud,.tsii,.tpif" hidden />
    </div>
    <div class="grow"></div>
    <div>
      <span id="audioBadge" class="badge">audio off</span>
      <a class="support-btn donate" href="https://paypal.me/curioustorvald" target="_blank" rel="noopener" title="Support development via PayPal">♥ Donate</a>
      <a class="support-btn sponsor" href="https://github.com/sponsors/curioustorvald" target="_blank" rel="noopener" title="Become a GitHub Sponsor">Sponsor</a>
      <button id="themeBtn" title="Toggle dark/light theme">◐</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="timeline" class="active">Timeline</button>
    <button data-view="cues">Cues</button>
    <button data-view="pattern">Patterns</button>
    <button data-view="samples">Samples</button>
    <button data-view="instruments">Instruments</button>
    <button data-view="project">Project</button>
    <button data-view="files">File</button>
  </nav>

  <div id="toolbox" class="toolbox" hidden>
    <button id="tbRetune">Retune…</button>
    <button id="tbRaw" title="Show note words as raw hex">Raw: off</button>
  </div>

  <main id="viewHost" class="view-host">
    <div id="emptyState" class="empty-state">
      <p><strong>Drop a .taud file anywhere</strong> or use Open…</p>
    </div>
    <canvas id="timeline" class="view-canvas" hidden></canvas>
    <canvas id="cuesCanvas" class="view-canvas" hidden></canvas>
    <div id="patternHost" class="view-dom" hidden></div>
    <div id="samplesHost" class="view-dom" hidden></div>
    <div id="instrumentsHost" class="view-dom" hidden></div>
    <div id="projectHost" class="view-dom" hidden></div>
    <div id="filesHost" class="files-host" hidden></div>
    <div id="placeholder" class="empty-state" hidden></div>
  </main>

  <div id="cmdPalette" class="cmd-palette" hidden></div>

  <footer class="statusbar">
    <span id="stFile" class="dim">no file</span>
    <span id="stDirty" class="dirty" hidden>●</span>
    <div class="grow"></div>
    <span id="stHint" class="dim">Space play/stop · arrows navigate · wheel scroll</span>
    <a class="gh-link" href="https://github.com/curioustorvald/Microtone.js" target="_blank" rel="noopener" title="View source / fork on GitHub">Fork me on GitHub ↗</a>
  </footer>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
